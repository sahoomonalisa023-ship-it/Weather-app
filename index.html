<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Modern Weather App</title>

    <link rel="stylesheet" href="style.css" />

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>

  <body>
    <div class="container">
      <div class="weather-card">
        <header>
          <h1>Weather Report</h1>
        </header>

        <!-- SEARCH -->
        <div class="search-section">
          <input type="text" id="city-input" placeholder="Enter city name..." />

          <div class="controls-row">
            <!-- ✅ FIX: historical hata diya -->
            <select id="type-select">
              <option value="current">Current Weather</option>
              <option value="forecast">5-Day Forecast</option>
            </select>

            <button id="search-btn">
              <i class="fa-solid fa-magnifying-glass"></i> Search
            </button>
          </div>
        </div>

        <!-- LOADING -->
        <div id="loading-spinner" class="hidden">
          <div class="spinner"></div>
        </div>

        <!-- ERROR -->
        <div id="error-message" class="hidden"></div>

        <!-- CURRENT WEATHER -->
        <div id="weather-result" class="hidden">
          <h2 id="result-city"></h2>
          <p id="result-date"></p>

          <div class="current-weather">
            <img id="weather-icon" src="" />
            <div>
              <span id="result-temp"></span>
              <p id="result-desc"></p>
            </div>
          </div>

          <div class="details-grid">
            <div>
              <span>Humidity</span>
              <strong id="detail-humidity"></strong>
            </div>

            <div>
              <span>Wind</span>
              <strong id="detail-wind"></strong>
            </div>

            <div>
              <span>Pressure</span>
              <strong id="detail-pressure"></strong>
            </div>
          </div>
        </div>

        <!-- FORECAST -->
        <div id="forecast-result" class="hidden"></div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
